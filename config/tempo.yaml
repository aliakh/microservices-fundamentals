auth_enabled: false

server:
  http_listen_port: 3200
  grpc_listen_port: 9095      # needed for internal gRPC worker in single-binary

# Memberlist backs Tempo's rings (KV)
memberlist:
  bind_port: 7946
  # If interface discovery fails in your env, you can set an explicit IP via:
  # advertise_addr: 172.20.0.10

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# The ingester's partition ring configuration (MUST be under 'ingester')
ingester:
  partition_ring:
    # In containers, advertise the container's interface instead of 127.0.0.1
    instance_interface_names: [ "eth0" ]
    # Alternatively:
    # instance_addr: 172.20.0.10

# Live (recent) data store and its ring
live_store:
  ring:
    instance_interface_names: [ "eth0" ]
    # Or:
    # instance_addr: 172.20.0.10

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks