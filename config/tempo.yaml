auth_enabled: false

server:
  http_listen_port: 3200
  grpc_listen_port: 9095   # add gRPC for the internal worker in single-binary

# Backing store for rings (gossip)
memberlist:
  bind_port: 7946
  # If you prefer explicit IPs, you can set advertise_addr instead:
  # advertise_addr: 172.20.0.10

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Live (recent) data path ring — required for recent queries/search
live_store:
  ring:
    instance_interface_names: [ "eth0" ]  # <- critical in Docker
    # Or, alternatively:
    # instance_addr: 172.20.0.10

# Partition ring backs the search/tag APIs
partition_ring:
  instance_interface_names: [ "eth0" ]
  # Or:
  # instance_addr: 172.20.0.10

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
