apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Tempo
  - name: Loki

datasources:
  - name: Prometheus
    type: prometheus
    uid: "prometheus-uid"
    access: proxy
    url: http://prometheus:9090
    basicAuth: false
    orgId: 1
    isDefault: false
    version: 1
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    basicAuth: false
    orgId: 1
    isDefault: false
    version: 1
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    basicAuth: false
    orgId: 1
    isDefault: false
    version: 1
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: 'xTraceId=([A-Za-z0-9]+)'
          url: '${__value.raw}'
          datasourceUid: tempo
