apiVersion: 1

providers:
  - name: "spring-cloud-gateway"
    folder: "Spring Cloud Gateway"
    type: file
    editable: true
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/gateway.yaml

dashboard:
  id: null
  uid: "spring-cloud-gateway-dashboard"
  title: "Spring Cloud Gateway"
  tags: ["gateway", "spring", "prometheus"]
  timezone: "browser"
  schemaVersion: 36
  version: 1
  refresh: "30s"

  time:
    from: "now-6h"
    to: "now"

  panels:

    ###############################################
    # RESOURCE SERVICE (/resources/**)
    ###############################################

    - type: row
      title: "Resource Service (/resources/**)"
      collapsed: false

    # Total RPS
    - id: 101
      title: "Resource Service - Total Requests (RPS)"
      type: stat
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              uri=~"/resources/.*"
            }[1m]))
      gridPos: { x: 0, y: 2, w: 8, h: 4 }

    # Successful Requests (2xx)
    - id: 102
      title: "Resource Service - Success (2xx)"
      type: stat
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              status=~"2..",
              uri=~"/resources/.*"
            }[1m]))
      gridPos: { x: 8, y: 2, w: 8, h: 4 }

    # Error Requests (!2xx)
    - id: 103
      title: "Resource Service - Errors (!2xx)"
      type: stat
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              status!~"2..",
              uri=~"/resources/.*"
            }[1m]))
      gridPos: { x: 16, y: 2, w: 8, h: 4 }

    # Average Latency (ms)
    - id: 104
      title: "Resource Service - Average Latency (ms)"
      type: timeseries
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_sum{
              application="api-gateway",
              uri=~"/resources/.*"
            }[1m]))
            /
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              uri=~"/resources/.*"
            }[1m]))
            * 1000
      gridPos: { x: 0, y: 6, w: 12, h: 8 }

    # p95 Latency (
    - id: 105
      title: "Resource Service - p95 Latency (ms)"
      type: timeseries
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            histogram_quantile(
              0.95,
              sum(rate(http_server_requests_seconds_bucket{
                application="api-gateway",
                uri=~"/resources/.*"
              }[5m])) by (le)
            ) * 1000
      gridPos: { x: 12, y: 6, w: 12, h: 8 }


    ###############################################
    # SONG SERVICE (/songs/**)
    ###############################################

    - type: row
      title: "Song Service (/songs/**)"
      collapsed: false

    - id: 201
      title: "Song Service - Total Requests (RPS)"
      type: stat
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              uri=~"/songs/.*"
            }[1m]))
      gridPos: { x: 0, y: 20, w: 8, h: 4 }

    - id: 202
      title: "Song Service - Success (2xx)"
