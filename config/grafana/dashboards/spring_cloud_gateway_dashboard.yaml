      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              status!~"2..",
              uri=~"/songs/.*"
            }[1m]))
      gridPos: { x: 16, y: 20, w: 8, h: 4 }

    - id: 204
      title: "Song Service - Average Latency (ms)"
      type: timeseries
      datasource:
        uid: "prometheus-uid"
      targets:
        - expr: >
            sum(rate(http_server_requests_seconds_sum{
              application="api-gateway",
              uri=~"/songs/.*"
            }[1m]))
            /
            sum(rate(http_server_requests_seconds_count{
              application="api-gateway",
              uri=~"/songs/.*"
            }[1m]))
            * 1000
      gridPos: { x: 0, y: 24, w: 12, h: 8 }

    - id: 205
      title: "Song Service - p95 Latency (ms)"
      type: timeseries
      datasource:
        uid: "prometheus-uid"
