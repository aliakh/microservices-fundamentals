server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Keep only running containers
      - source_labels: [__meta_docker_container_state]
        regex: running
        action: keep

      # Drop high-cardinality 'filename' (not useful for queries)
      - action: labeldrop
        regex: filename

      # 1) If using docker compose, map compose service to 'service_name'
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service_name
        action: replace

      # 2) Fallback to image title if defined (OCI label)
      - source_labels: [__meta_docker_container_label_org_opencontainers_image_title]
        regex: (.+)
        target_label: service_name
        action: replace

      # 3) Fallback to container name (handles both "/name" and "name")
      - source_labels: [__meta_docker_container_name]
        regex: ^/?(.+)$
        replacement: $1
        target_label: service_name
        action: replace

      # 4) If still empty, force a default
      - source_labels: [service_name]
        regex: ^$
        replacement: unknown_service
        target_label: service_name
        action: replace

      # (Nice to have) container id for pinpointing a specific container instance
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
        action: replace

      # Stable job label for your queries
      - target_label: job
        replacement: docker
        action: replace

    pipeline_stages:
      # Parses Docker JSON logs and adds 'stream' (stdout|stderr)
      - docker: {}