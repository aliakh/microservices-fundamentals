server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: [ "scrap-logs=true" ]

    pipeline_stages:
      - docker: { }
      - regex:
          expression: '^(?P<ts>\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2},\d{3})'
      - timestamp:
          source: ts
          format: "2006-01-02 15:04:05,000"
      - regex:
          expression: 'traceId=(?P<traceId>(?i:[0-9a-f]{8}(?:-[0-9a-f]{4}){3}-[0-9a-f]{12}|[0-9a-f]{32}))'
      - labels:
          traceId:

    relabel_configs:
      - source_labels: [ __meta_docker_container_state ]
        regex: running
        action: keep

      - source_labels: [ __meta_docker_container_label_com_docker_compose_service ]
        regex: (.+)
        target_label: service_name
        action: replace

      - source_labels: [ __meta_docker_container_label_com_docker_compose_project ]
        regex: (.+)
        target_label: project
        action: replace

      - source_labels: [ service_name, __meta_docker_container_name ]
        separator: ;
        regex: ^$;^/?(.+)$
        target_label: service_name
        replacement: $1
        action: replace

      - source_labels: [ service_name ]
        regex: ^$
        replacement: unknown_service
        target_label: service_name
        action: replace

      - target_label: job
        replacement: docker
        action: replace